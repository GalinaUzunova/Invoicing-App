<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${invoice.invoiceNumber} + ' | Invoicing Manager'">Invoice | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/customers}">Invoicing Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/customers}">Customers</a>
            <a class="nav-link active" th:href="@{/invoices}">Invoices</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h1 class="h3 mb-1" th:text="${invoice.invoiceNumber}">INV-001</h1>
            <p class="text-secondary mb-0">
                <span th:text="${invoice.customer.name}">Customer</span>
                <span class="mx-2">|</span>
                <span class="badge text-bg-secondary" th:text="${invoice.status}">DRAFT</span>
            </p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-outline-primary" th:href="@{/invoices/{id}/edit(id=${invoice.id})}">Edit</a>
            <form th:if="${invoice.status.name() == 'DRAFT'}" th:action="@{/invoices/{id}/send(id=${invoice.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-primary" type="submit">Mark sent</button>
            </form>
            <form th:if="${invoice.status.name() != 'PAID'}" th:action="@{/invoices/{id}/paid(id=${invoice.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-success" type="submit">Mark paid</button>
            </form>
        </div>
    </div>

    <div class="app-card bg-white p-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2 class="h5">Bill to</h2>
                <p class="mb-1 fw-semibold" th:text="${invoice.customer.name}">Customer</p>
                <p class="mb-1" th:text="${invoice.customer.email} ?: ''">email@example.com</p>
                <p class="mb-0 text-secondary" th:text="${invoice.customer.billingAddress} ?: ''">Address</p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="mb-1">Issue date: <span th:text="${invoice.issueDate}">2026-01-01</span></p>
                <p class="mb-0">Due date: <span th:text="${invoice.dueDate} ?: '-'">2026-01-15</span></p>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Description</th>
                    <th class="text-end">Qty</th>
                    <th class="text-end">Unit price</th>
                    <th class="text-end">Tax %</th>
                    <th class="text-end">Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lineItem : ${invoice.lineItems}">
                    <td th:text="${lineItem.itemName}">Item</td>
                    <td th:text="${lineItem.description} ?: '-'">Description</td>
                    <td class="text-end" th:text="${lineItem.quantity}">1.00</td>
                    <td class="text-end" th:text="${lineItem.unitPrice}">0.00</td>
                    <td class="text-end" th:text="${lineItem.taxRate}">0.00</td>
                    <td class="text-end" th:text="${lineItem.lineTotal}">0.00</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="row justify-content-end">
            <div class="col-md-5 col-lg-4">
                <dl class="row mb-0">
                    <dt class="col-6">Subtotal</dt>
                    <dd class="col-6 text-end" th:text="${invoice.subtotal}">0.00</dd>
                    <dt class="col-6">Tax</dt>
                    <dd class="col-6 text-end" th:text="${invoice.taxTotal}">0.00</dd>
                    <dt class="col-6 h5">Total</dt>
                    <dd class="col-6 text-end h5" th:text="${invoice.grandTotal}">0.00</dd>
                </dl>
            </div>
        </div>

        <div th:if="${invoice.notes}" class="mt-4">
            <h2 class="h6">Notes</h2>
            <p class="mb-0" th:text="${invoice.notes}">Notes</p>
        </div>

        <form class="mt-4" th:action="@{/invoices/{id}/delete(id=${invoice.id})}" method="post"
              onsubmit="return confirm('Delete this invoice?');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-danger btn-sm" type="submit">Delete invoice</button>
        </form>
    </div>
</main>
</body>
</html>
