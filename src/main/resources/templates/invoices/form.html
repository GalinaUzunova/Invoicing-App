<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | Invoicing Manager'">Invoice | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/customers}">Invoicing Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/customers}">Customers</a>
            <a class="nav-link active" th:href="@{/invoices}">Invoices</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="app-card bg-white p-4">
        <h1 class="h3 mb-3" th:text="${pageTitle}">Invoice</h1>

        <div th:if="${#lists.isEmpty(customers)}" class="alert alert-warning">
            Add a customer before creating an invoice.
            <a th:href="@{/customers/new}">Create customer</a>
        </div>

        <form th:action="${formAction}" th:object="${invoiceDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="customerId">Customer</label>
                    <select class="form-select" id="customerId" th:field="*{customerId}" required>
                        <option value="">Choose customer</option>
                        <option th:each="customer : ${customers}"
                                th:value="${customer.id}"
                                th:text="${customer.name}">Customer</option>
                    </select>
                    <div class="text-danger small" th:errors="*{customerId}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="invoiceNumber">Invoice number</label>
                    <input class="form-control" id="invoiceNumber" th:field="*{invoiceNumber}" required>
                    <div class="text-danger small" th:errors="*{invoiceNumber}"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="issueDate">Issue date</label>
                    <input class="form-control" id="issueDate" type="date" th:field="*{issueDate}" required>
                    <div class="text-danger small" th:errors="*{issueDate}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="dueDate">Due date</label>
                    <input class="form-control" id="dueDate" type="date" th:field="*{dueDate}">
                    <div class="text-danger small" th:errors="*{dueDate}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="notes">Notes</label>
                <textarea class="form-control" id="notes" rows="3" th:field="*{notes}"></textarea>
                <div class="text-danger small" th:errors="*{notes}"></div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
                <h2 class="h5 mb-0">Line items</h2>
                <button class="btn btn-outline-primary btn-sm" id="add-line-item" type="button">Add line item</button>
            </div>
            <div class="text-danger small mb-2" th:errors="*{lineItems}"></div>

            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Item</th>
                        <th>Description</th>
                        <th>Qty</th>
                        <th>Unit price</th>
                        <th>Tax %</th>
                        <th>Preview total</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody id="line-items" data-line-items>
                    <tr th:each="lineItem, stat : *{lineItems}" data-line-item-row>
                        <td>
                            <input class="form-control" th:field="*{lineItems[__${stat.index}__].itemName}" required>
                            <div class="text-danger small" th:errors="*{lineItems[__${stat.index}__].itemName}"></div>
                        </td>
                        <td>
                            <input class="form-control" th:field="*{lineItems[__${stat.index}__].description}">
                            <div class="text-danger small" th:errors="*{lineItems[__${stat.index}__].description}"></div>
                        </td>
                        <td>
                            <input class="form-control" type="number" step="0.01" min="0.01"
                                   th:field="*{lineItems[__${stat.index}__].quantity}" data-quantity required>
                            <div class="text-danger small" th:errors="*{lineItems[__${stat.index}__].quantity}"></div>
                        </td>
                        <td>
                            <input class="form-control" type="number" step="0.01" min="0"
                                   th:field="*{lineItems[__${stat.index}__].unitPrice}" data-unit-price required>
                            <div class="text-danger small" th:errors="*{lineItems[__${stat.index}__].unitPrice}"></div>
                        </td>
                        <td>
                            <input class="form-control" type="number" step="0.01" min="0"
                                   th:field="*{lineItems[__${stat.index}__].taxRate}" data-tax-rate required>
                            <div class="text-danger small" th:errors="*{lineItems[__${stat.index}__].taxRate}"></div>
                        </td>
                        <td class="text-end" data-line-preview>0.00</td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm" type="button" data-remove-line-item>Remove</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-end text-secondary mb-3">
                Estimated total: <strong data-invoice-preview>0.00</strong>
            </div>

            <button class="btn btn-primary" type="submit" th:disabled="${#lists.isEmpty(customers)}">Save invoice</button>
            <a class="btn btn-link" th:href="@{/invoices}">Cancel</a>
        </form>
    </div>

    <template id="line-item-template">
        <tr data-line-item-row>
            <td><input class="form-control" name="lineItems[__index__].itemName" required></td>
            <td><input class="form-control" name="lineItems[__index__].description"></td>
            <td><input class="form-control" type="number" step="0.01" min="0.01" name="lineItems[__index__].quantity" value="1.00" data-quantity required></td>
            <td><input class="form-control" type="number" step="0.01" min="0" name="lineItems[__index__].unitPrice" value="0.00" data-unit-price required></td>
            <td><input class="form-control" type="number" step="0.01" min="0" name="lineItems[__index__].taxRate" value="0.00" data-tax-rate required></td>
            <td class="text-end" data-line-preview>0.00</td>
            <td><button class="btn btn-outline-danger btn-sm" type="button" data-remove-line-item>Remove</button></td>
        </tr>
    </template>
</main>

<script th:src="@{/js/invoice-form.js}"></script>
</body>
</html>
