<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead('Invoices')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar('invoices')}"></nav>

<main class="container py-4">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Invoices</h1>
            <p class="text-secondary mb-0">Create and track invoice status.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/invoices/new}">
            <i class="bi bi-plus-circle me-1"></i>New invoice
        </a>
    </div>

    <div class="bg-white rounded-3 border p-3 mb-3 shadow-sm">
        <form class="row g-2 align-items-end" th:action="@{/invoices}" method="get">
            <div class="col-md-4 col-lg-3">
                <label class="form-label" for="status">Filter by status</label>
                <select class="form-select form-select-sm" id="status" name="status">
                    <option value="">All statuses</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${status == selectedStatus}">DRAFT</option>
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-primary btn-sm" type="submit">
                    <i class="bi bi-funnel me-1"></i>Filter
                </button>
                <a class="btn btn-link btn-sm text-secondary" th:href="@{/invoices}" th:if="${selectedStatus != null}">Clear</a>
            </div>
        </form>
    </div>

    <div class="app-card bg-white p-4">
        <div th:if="${#lists.isEmpty(invoices)}" class="empty-state">
            <div class="empty-state-icon"><i class="bi bi-file-earmark-text"></i></div>
            <p class="empty-state-title">No invoices found</p>
            <p class="empty-state-text">Try a different filter or create a new invoice.</p>
            <a class="btn btn-primary btn-sm" th:href="@{/invoices/new}">
                <i class="bi bi-plus-circle me-1"></i>Create invoice
            </a>
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(invoices)}">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Invoice</th>
                    <th>Customer</th>
                    <th>Status</th>
                    <th>Issue date</th>
                    <th>Due date</th>
                    <th class="text-end">Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="invoice : ${invoices}">
                    <td>
                        <a class="fw-medium text-decoration-none"
                           th:href="@{/invoices/{id}(id=${invoice.id})}"
                           th:text="${invoice.invoiceNumber}">INV-001</a>
                    </td>
                    <td>
                        <a class="text-secondary text-decoration-none"
                           th:href="@{/customers/{id}(id=${invoice.customer.id})}"
                           th:text="${invoice.customer.name}">Customer</a>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${invoice.status.name() == 'PAID'} ? 'badge-paid' :
                                             (${invoice.status.name() == 'SENT'} ? 'badge-sent' : 'badge-draft')"
                              th:text="${invoice.status}">DRAFT</span>
                    </td>
                    <td class="text-secondary" th:text="${invoice.issueDate}">2026-01-01</td>
                    <td class="text-secondary" th:text="${invoice.dueDate} ?: '-'">2026-01-15</td>
                    <td class="text-end fw-medium" th:text="${invoice.grandTotal}">0.00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
