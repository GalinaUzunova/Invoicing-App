<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="app-card bg-white p-4">
                <h1 class="h3 mb-3">Login</h1>
                <p class="text-secondary">Access your customers and invoices.</p>

                <div th:if="${param.error}" class="alert alert-danger">
                    Invalid email or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    You have been logged out.
                </div>
                <div th:if="${param.registered}" class="alert alert-success">
                    Account created. Please log in.
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label" for="username">Email</label>
                        <input class="form-control" id="username" name="username" type="email" autocomplete="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>

                <p class="mt-3 mb-0 text-center">
                    <span class="text-secondary">No account?</span>
                    <a th:href="@{/register}">Create one</a>
                </p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
