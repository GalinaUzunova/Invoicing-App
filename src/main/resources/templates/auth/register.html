<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="app-card bg-white p-4">
                <h1 class="h3 mb-3">Create Account</h1>
                <p class="text-secondary">Set up your invoicing workspace.</p>

                <form th:action="@{/register}" th:object="${registerUserDTO}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="firstName">First name</label>
                            <input class="form-control" id="firstName" th:field="*{firstName}" required>
                            <div class="text-danger small" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="lastName">Last name</label>
                            <input class="form-control" id="lastName" th:field="*{lastName}" required>
                            <div class="text-danger small" th:errors="*{lastName}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" id="email" type="email" th:field="*{email}" required>
                        <div class="text-danger small" th:errors="*{email}"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" type="password" th:field="*{password}" required>
                            <div class="text-danger small" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="confirmPassword">Confirm password</label>
                            <input class="form-control" id="confirmPassword" type="password" th:field="*{confirmPassword}" required>
                            <div class="text-danger small" th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>

                    <div class="text-danger small mb-3" th:errors="*{passwordConfirmed}"></div>

                    <button class="btn btn-primary" type="submit">Create account</button>
                    <a class="btn btn-link" th:href="@{/login}">Back to login</a>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
