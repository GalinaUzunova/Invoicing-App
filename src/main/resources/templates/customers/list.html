<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead('Customers')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar('customers')}"></nav>

<main class="container py-4">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Customers</h1>
            <p class="text-secondary mb-0">Manage your customer records.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/customers/new}">
            <i class="bi bi-person-plus me-1"></i>New customer
        </a>
    </div>

    <div class="app-card bg-white p-4">
        <div th:if="${#lists.isEmpty(customers)}" class="empty-state">
            <div class="empty-state-icon"><i class="bi bi-people"></i></div>
            <p class="empty-state-title">No customers yet</p>
            <p class="empty-state-text">Add your first customer to start creating invoices.</p>
            <a class="btn btn-primary btn-sm" th:href="@{/customers/new}">
                <i class="bi bi-person-plus me-1"></i>Create your first customer
            </a>
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(customers)}">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${customers}">
                    <td>
                        <a class="fw-medium text-decoration-none"
                           th:href="@{/customers/{id}(id=${customer.id})}"
                           th:text="${customer.name}">Customer name</a>
                    </td>
                    <td class="text-secondary" th:text="${customer.email} ?: '-'">email@example.com</td>
                    <td class="text-secondary" th:text="${customer.phone} ?: '-'">Phone</td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/customers/{id}/edit(id=${customer.id})}">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
