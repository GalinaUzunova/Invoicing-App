<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customers | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/customers}">Invoicing Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:href="@{/customers}">Customers</a>
            <a class="nav-link" th:href="@{/invoices}">Invoices</a>
            <form th:action="@{/logout}" method="post" class="ms-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1">Customers</h1>
            <p class="text-secondary mb-0">Manage your customer records.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/customers/new}">New customer</a>
    </div>

    <div class="app-card bg-white p-4">
        <div th:if="${#lists.isEmpty(customers)}" class="text-center text-secondary py-5">
            No customers yet. Create your first customer to start invoicing.
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(customers)}">
            <table class="table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${customers}">
                    <td>
                        <a th:href="@{/customers/{id}(id=${customer.id})}" th:text="${customer.name}">Customer name</a>
                    </td>
                    <td th:text="${customer.email} ?: '-'">email@example.com</td>
                    <td th:text="${customer.phone} ?: '-'">Phone</td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/customers/{id}/edit(id=${customer.id})}">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
