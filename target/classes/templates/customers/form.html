<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead(${pageTitle})}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar('customers')}"></nav>

<main class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0" style="font-size: 0.875rem">
            <li class="breadcrumb-item"><a th:href="@{/customers}" class="text-decoration-none">Customers</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Customer</li>
        </ol>
    </nav>

    <div class="app-card bg-white p-4">
        <h1 class="h4 fw-bold mb-4" th:text="${pageTitle}">Customer</h1>

        <form th:action="${formAction}" th:object="${customerDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <p class="form-section-title">Basic info</p>
            <div class="mb-3">
                <label class="form-label" for="name">Name <span class="text-danger">*</span></label>
                <input class="form-control" id="name" th:field="*{name}" required>
                <div class="field-error" th:errors="*{name}"></div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="email">Email <span class="text-danger">*</span></label>
                    <input class="form-control" id="email" type="email" th:field="*{email}" placeholder="customer@example.com" required>
                    <div class="field-error" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="phone">Phone <span class="text-danger">*</span></label>
                    <input class="form-control" id="phone" th:field="*{phone}" required>
                    <div class="field-error" th:errors="*{phone}"></div>
                </div>
            </div>

            <p class="form-section-title mt-2">Address</p>
            <div class="mb-3">
                <label class="form-label" for="billingAddress">Billing address</label>
                <textarea class="form-control" id="billingAddress" rows="3" th:field="*{billingAddress}"></textarea>
                <div class="field-error" th:errors="*{billingAddress}"></div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="city">City</label>
                    <input class="form-control" id="city" th:field="*{city}">
                    <div class="field-error" th:errors="*{city}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="country">Country</label>
                    <input class="form-control" id="country" th:field="*{country}">
                    <div class="field-error" th:errors="*{country}"></div>
                </div>
            </div>

            <p class="form-section-title mt-2">Additional</p>
            <div class="mb-3">
                <label class="form-label" for="taxNumber">Tax number</label>
                <input class="form-control" id="taxNumber" th:field="*{taxNumber}">
                <div class="field-error" th:errors="*{taxNumber}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="notes">Notes</label>
                <textarea class="form-control" id="notes" rows="3" th:field="*{notes}"></textarea>
                <div class="field-error" th:errors="*{notes}"></div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/customers}">Cancel</a>
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-check-lg me-1"></i>Save customer
                </button>
            </div>
        </form>
    </div>

</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
