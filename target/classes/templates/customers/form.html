<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | Invoicing Manager'">Customer | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/customers}">Invoicing Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:href="@{/customers}">Customers</a>
            <a class="nav-link" th:href="@{/invoices}">Invoices</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="app-card bg-white p-4">
        <h1 class="h3 mb-3" th:text="${pageTitle}">Customer</h1>

        <form th:action="${formAction}" th:object="${customerDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" id="name" th:field="*{name}" required>
                <div class="text-danger small" th:errors="*{name}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" th:field="*{email}">
                    <div class="text-danger small" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="phone">Phone</label>
                    <input class="form-control" id="phone" th:field="*{phone}">
                    <div class="text-danger small" th:errors="*{phone}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="billingAddress">Billing address</label>
                <textarea class="form-control" id="billingAddress" rows="3" th:field="*{billingAddress}"></textarea>
                <div class="text-danger small" th:errors="*{billingAddress}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="city">City</label>
                    <input class="form-control" id="city" th:field="*{city}">
                    <div class="text-danger small" th:errors="*{city}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="country">Country</label>
                    <input class="form-control" id="country" th:field="*{country}">
                    <div class="text-danger small" th:errors="*{country}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="taxNumber">Tax number</label>
                <input class="form-control" id="taxNumber" th:field="*{taxNumber}">
                <div class="text-danger small" th:errors="*{taxNumber}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="notes">Notes</label>
                <textarea class="form-control" id="notes" rows="3" th:field="*{notes}"></textarea>
                <div class="text-danger small" th:errors="*{notes}"></div>
            </div>

            <button class="btn btn-primary" type="submit">Save customer</button>
            <a class="btn btn-link" th:href="@{/customers}">Cancel</a>
        </form>
    </div>
</main>
</body>
</html>
