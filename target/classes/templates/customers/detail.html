<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${customer.name} + ' | Invoicing Manager'">Customer | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/customers}">Invoicing Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:href="@{/customers}">Customers</a>
            <a class="nav-link" th:href="@{/invoices}">Invoices</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h1 class="h3 mb-1" th:text="${customer.name}">Customer name</h1>
            <p class="text-secondary mb-0">Customer details and invoice history.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary" th:href="@{/customers/{id}/edit(id=${customer.id})}">Edit</a>
            <a class="btn btn-primary" th:href="@{/invoices/new(customerId=${customer.id})}">New invoice</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="app-card bg-white p-4">
                <h2 class="h5">Details</h2>
                <dl class="mb-0">
                    <dt>Email</dt>
                    <dd th:text="${customer.email} ?: '-'">email@example.com</dd>
                    <dt>Phone</dt>
                    <dd th:text="${customer.phone} ?: '-'">Phone</dd>
                    <dt>Address</dt>
                    <dd th:text="${customer.billingAddress} ?: '-'">Address</dd>
                    <dt>Tax number</dt>
                    <dd th:text="${customer.taxNumber} ?: '-'">Tax number</dd>
                </dl>

                <form class="mt-3" th:action="@{/customers/{id}/delete(id=${customer.id})}" method="post"
                      onsubmit="return confirm('Delete this customer?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-danger btn-sm" type="submit">Delete customer</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="app-card bg-white p-4">
                <h2 class="h5">Invoices</h2>
                <div th:if="${#lists.isEmpty(invoices)}" class="text-secondary">
                    No invoices for this customer yet.
                </div>
                <div class="table-responsive" th:unless="${#lists.isEmpty(invoices)}">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Number</th>
                            <th>Status</th>
                            <th>Issue date</th>
                            <th class="text-end">Total</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="invoice : ${invoices}">
                            <td><a th:href="@{/invoices/{id}(id=${invoice.id})}" th:text="${invoice.invoiceNumber}">INV-001</a></td>
                            <td><span class="badge text-bg-secondary" th:text="${invoice.status}">DRAFT</span></td>
                            <td th:text="${invoice.issueDate}">2026-01-01</td>
                            <td class="text-end" th:text="${invoice.grandTotal}">0.00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
