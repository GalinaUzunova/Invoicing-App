<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead(${pageTitle})}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar('estimates')}"></nav>

<main class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0" style="font-size: 0.875rem">
            <li class="breadcrumb-item"><a th:href="@{/estimates}" class="text-decoration-none">Estimates</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Estimate</li>
        </ol>
    </nav>

    <div class="app-card bg-white p-4">
        <h1 class="h4 fw-bold mb-4" th:text="${pageTitle}">Estimate</h1>

        <div th:if="${#lists.isEmpty(customers)}" class="alert alert-warning d-flex align-items-center gap-2 mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
            <span>You need to add a customer before creating an estimate.
                <a th:href="@{/customers/new}" class="alert-link">Create customer</a>
            </span>
        </div>

        <form th:action="${formAction}" th:object="${estimateDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <p class="form-section-title">Estimate details</p>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="customerId">Customer <span class="text-danger">*</span></label>
                    <select class="form-select" id="customerId" th:field="*{customerId}" required>
                        <option value="">Choose customer</option>
                        <option th:each="customer : ${customers}"
                                th:value="${customer.id}"
                                th:text="${customer.name}">Customer</option>
                    </select>
                    <div class="field-error" th:errors="*{customerId}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="quotationNumber">Quotation number <span class="text-danger">*</span></label>
                    <input class="form-control" id="quotationNumber" th:field="*{quotationNumber}" required>
                    <div class="field-error" th:errors="*{quotationNumber}"></div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="issueDate">Issue date <span class="text-danger">*</span></label>
                    <input class="form-control" id="issueDate" type="date" th:field="*{issueDate}" required>
                    <div class="field-error" th:errors="*{issueDate}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="expiryDate">Expiry date</label>
                    <input class="form-control" id="expiryDate" type="date" th:field="*{expiryDate}">
                    <div class="field-error" th:errors="*{expiryDate}"></div>
                    <div class="field-error" th:errors="*{expiryDateOnOrAfterIssueDate}"></div>
                </div>
            </div>

            <p class="form-section-title mt-2">Notes</p>
            <div class="mb-3">
                <label class="form-label" for="notes">Notes <span class="text-secondary fw-normal">(optional)</span></label>
                <textarea class="form-control" id="notes" rows="3" th:field="*{notes}" placeholder="Terms, conditions, or any additional information…"></textarea>
                <div class="field-error" th:errors="*{notes}"></div>
            </div>

            <p class="form-section-title mt-2">Line items</p>
            <div class="field-error mb-2" th:errors="*{lineItems}"></div>

            <div class="table-responsive mb-3">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th style="min-width: 9rem">Item</th>
                        <th style="min-width: 10rem">Description</th>
                        <th style="min-width: 7rem">Qty</th>
                        <th style="min-width: 7rem">Unit price</th>
                        <th style="min-width: 7rem">Tax %</th>
                        <th style="min-width: 6rem" class="text-end">Preview</th>
                        <th style="min-width: 5rem"></th>
                    </tr>
                    </thead>
                    <tbody id="line-items" data-line-items>
                    <tr th:each="lineItem, stat : *{lineItems}" data-line-item-row>
                        <td>
                            <input class="form-control form-control-sm" th:field="*{lineItems[__${stat.index}__].itemName}" required>
                            <div class="field-error" th:errors="*{lineItems[__${stat.index}__].itemName}"></div>
                        </td>
                        <td>
                            <input class="form-control form-control-sm" th:field="*{lineItems[__${stat.index}__].description}">
                            <div class="field-error" th:errors="*{lineItems[__${stat.index}__].description}"></div>
                        </td>
                        <td>
                            <input class="form-control form-control-sm" type="number" step="0.01" min="0.01"
                                   th:field="*{lineItems[__${stat.index}__].quantity}" data-quantity required>
                            <div class="field-error" th:errors="*{lineItems[__${stat.index}__].quantity}"></div>
                        </td>
                        <td>
                            <input class="form-control form-control-sm" type="number" step="0.01" min="0.01"
                                   th:field="*{lineItems[__${stat.index}__].unitPrice}" data-unit-price required>
                            <div class="field-error" th:errors="*{lineItems[__${stat.index}__].unitPrice}"></div>
                        </td>
                        <td>
                            <input class="form-control form-control-sm" type="number" step="0.01" min="0"
                                   th:field="*{lineItems[__${stat.index}__].taxRate}" data-tax-rate required>
                            <div class="field-error" th:errors="*{lineItems[__${stat.index}__].taxRate}"></div>
                        </td>
                        <td class="text-end fw-medium" data-line-preview>0.00</td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm" type="button" data-remove-line-item>
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-outline-primary btn-sm" id="add-line-item" type="button">
                    <i class="bi bi-plus me-1"></i>Add line item
                </button>
                <div class="totals-strip" style="min-width: 220px">
                    <div class="total-row grand">
                        <span>Estimated total</span>
                        <span data-invoice-preview>0.00</span>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/estimates}">Cancel</a>
                <button class="btn btn-primary" type="submit" th:disabled="${#lists.isEmpty(customers)}">
                    <i class="bi bi-check-lg me-1"></i>Save estimate
                </button>
            </div>
        </form>
    </div>

    <template id="line-item-template">
        <tr data-line-item-row>
            <td><input class="form-control form-control-sm" name="lineItems[__index__].itemName" required></td>
            <td><input class="form-control form-control-sm" name="lineItems[__index__].description"></td>
            <td><input class="form-control form-control-sm" type="number" step="0.01" min="0.01" name="lineItems[__index__].quantity" value="1.00" data-quantity required></td>
            <td><input class="form-control form-control-sm" type="number" step="0.01" min="0.01" name="lineItems[__index__].unitPrice" value="" data-unit-price required></td>
            <td><input class="form-control form-control-sm" type="number" step="0.01" min="0" name="lineItems[__index__].taxRate" value="0.00" data-tax-rate required></td>
            <td class="text-end fw-medium" data-line-preview>0.00</td>
            <td><button class="btn btn-outline-danger btn-sm" type="button" data-remove-line-item><i class="bi bi-trash"></i></button></td>
        </tr>
    </template>

</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script th:src="@{/js/invoice-form.js}"></script>
</body>
</html>
