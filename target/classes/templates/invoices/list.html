<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invoices | Invoicing Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/customers}">Invoicing Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/customers}">Customers</a>
            <a class="nav-link active" th:href="@{/invoices}">Invoices</a>
            <form th:action="@{/logout}" method="post" class="ms-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1">Invoices</h1>
            <p class="text-secondary mb-0">Create and track invoice status.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/invoices/new}">New invoice</a>
    </div>

    <div class="app-card bg-white p-4">
        <form class="row g-2 align-items-end mb-3" th:action="@{/invoices}" method="get">
            <div class="col-md-4">
                <label class="form-label" for="status">Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="">All statuses</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${status == selectedStatus}">DRAFT</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-primary w-100" type="submit">Filter</button>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(invoices)}" class="text-center text-secondary py-5">
            No invoices found.
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(invoices)}">
            <table class="table">
                <thead>
                <tr>
                    <th>Invoice</th>
                    <th>Customer</th>
                    <th>Status</th>
                    <th>Issue date</th>
                    <th>Due date</th>
                    <th class="text-end">Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="invoice : ${invoices}">
                    <td>
                        <a th:href="@{/invoices/{id}(id=${invoice.id})}" th:text="${invoice.invoiceNumber}">INV-001</a>
                    </td>
                    <td th:text="${invoice.customer.name}">Customer</td>
                    <td><span class="badge text-bg-secondary" th:text="${invoice.status}">DRAFT</span></td>
                    <td th:text="${invoice.issueDate}">2026-01-01</td>
                    <td th:text="${invoice.dueDate} ?: '-'">2026-01-15</td>
                    <td class="text-end" th:text="${invoice.grandTotal}">0.00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
