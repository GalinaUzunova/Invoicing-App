<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead('Company Details')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar('company')}"></nav>

<main class="container py-4">

    <div class="page-header">
        <h1 class="h3 fw-bold mb-1">Company details</h1>
        <p class="text-secondary mb-0">Your company information appears on invoices and estimates.</p>
    </div>

    <div th:if="${saved}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
        Company details saved successfully.
    </div>

    <div class="app-card bg-white p-4">
        <form th:action="@{/company}" th:object="${companyDetailsDTO}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <p class="form-section-title">Company information</p>
            <div class="mb-3">
                <label class="form-label" for="companyName">Company name</label>
                <input class="form-control" id="companyName" th:field="*{companyName}" placeholder="Your company name">
                <div class="field-error" th:errors="*{companyName}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="vatNumber">VAT number</label>
                    <input class="form-control" id="vatNumber" th:field="*{vatNumber}" placeholder="VAT / tax registration">
                    <div class="field-error" th:errors="*{vatNumber}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="phone">Phone</label>
                    <input class="form-control" id="phone" th:field="*{phone}" placeholder="+1 234 567 890">
                    <div class="field-error" th:errors="*{phone}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="address">Address</label>
                <textarea class="form-control" id="address" rows="3" th:field="*{address}" placeholder="Street, city, country"></textarea>
                <div class="field-error" th:errors="*{address}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" type="email" th:field="*{email}" placeholder="billing@company.com">
                <div class="field-error" th:errors="*{email}"></div>
            </div>

            <p class="form-section-title mt-2">Company logo</p>
            <div class="field-error mb-2" th:if="${#fields.hasErrors('*')}" th:errors="*"></div>

            <div class="d-flex flex-wrap align-items-start gap-4 mb-3">
                <div>
                    <img th:if="*{hasLogo}"
                         th:src="@{/company/logo}"
                         id="currentLogo"
                         class="company-logo-display has-logo mb-2"
                         alt="Current company logo">
                    <label for="logo" class="logo-upload-box mb-0" title="Choose logo image">
                        <img id="logoPreview" src="" alt="" class="logo-preview d-none">
                        <span class="logo-placeholder" id="logoPlaceholder">
                            <i class="bi bi-image fs-3 text-secondary opacity-50 d-block mb-1"></i>
                            <span class="text-secondary" style="font-size: 0.75rem">Choose logo</span>
                        </span>
                    </label>
                    <input type="file" id="logo" name="logo" accept="image/jpeg,image/png,image/gif,image/webp" class="d-none">
                    <p class="text-secondary mt-2 mb-0" style="font-size: 0.8125rem">JPEG, PNG, GIF, or WebP. Max 2 MB.</p>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-check-lg me-1"></i>Save company details
                </button>
            </div>
        </form>

        <form th:if="${companyDetailsDTO.hasLogo}" th:action="@{/company/logo/remove}" method="post" class="mt-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-danger btn-sm" type="submit">
                <i class="bi bi-trash me-1"></i>Remove logo
            </button>
        </form>
    </div>

</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
(function () {
    const input = document.getElementById('logo');
    const preview = document.getElementById('logoPreview');
    const placeholder = document.getElementById('logoPlaceholder');
    const box = document.querySelector('.logo-upload-box');
    const currentLogo = document.getElementById('currentLogo');
    if (!input || !preview || !placeholder) return;

    input.addEventListener('change', function () {
        const file = this.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function (e) {
            preview.src = e.target.result;
            preview.classList.remove('d-none');
            placeholder.classList.add('d-none');
            if (box) box.classList.add('has-logo');
            if (currentLogo) currentLogo.classList.add('d-none');
        };
        reader.readAsDataURL(file);
    });
})();
</script>
</body>
</html>
