<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead(${pageTitle})}"></head>
<body>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="app-card bg-white p-5 text-center">
                <p class="text-primary fw-semibold mb-2" th:text="${statusCode}">404</p>
                <h1 class="h3 fw-bold mb-3" th:text="${errorTitle}">Not found</h1>
                <p class="text-secondary mb-4" th:text="${errorMessage}">The requested page could not be found.</p>
                <p class="text-secondary small mb-4" th:if="${path}">
                    Path: <span th:text="${path}">/example</span>
                </p>
                <div class="d-flex justify-content-center gap-2">
                    <a class="btn btn-primary" th:href="@{/dashboard}">
                        <i class="bi bi-grid me-1"></i>Go to dashboard
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/}">
                        <i class="bi bi-house me-1"></i>Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
