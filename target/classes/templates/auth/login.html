<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead('Login')}"></head>
<body class="auth-shell">

<div class="auth-card app-card bg-white">
    <div class="mb-4">
        <div class="auth-logo d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-receipt-cutoff"></i>
            Invoicing Manager
        </div>
        <h1 class="h4 fw-bold mb-1">Welcome back</h1>
        <p class="text-secondary mb-0" style="font-size: 0.9rem">Access your customers and invoices.</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
        Invalid email or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
        You have been logged out.
    </div>
    <div th:if="${param.registered}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
        Account created. Please log in.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label class="form-label" for="username">Email address</label>
            <input class="form-control" id="username" name="username" type="email" autocomplete="email" required placeholder="you@example.com">
        </div>

        <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">
            <i class="bi bi-lock me-1"></i>Sign in
        </button>
    </form>

    <p class="mt-4 mb-0 text-center" style="font-size: 0.875rem">
        <span class="text-secondary">No account?</span>
        <a th:href="@{/register}" class="fw-medium">Create one</a>
    </p>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
