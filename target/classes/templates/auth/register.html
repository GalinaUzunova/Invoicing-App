<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: htmlHead('Create Account')}"></head>
<body class="auth-shell">

<div class="auth-card auth-card-wide app-card bg-white">
    <div class="mb-4">
        <div class="auth-logo d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-receipt-cutoff"></i>
            Invoicing Manager
        </div>
        <h1 class="h4 fw-bold mb-1">Create your account</h1>
        <p class="text-secondary mb-0" style="font-size: 0.9rem">Set up your invoicing workspace.</p>
    </div>

    <form th:action="@{/register}" th:object="${registerUserDTO}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <p class="form-section-title">Your name</p>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="firstName">First name</label>
                <input class="form-control" id="firstName" th:field="*{firstName}" autocomplete="given-name" required>
                <div class="field-error" th:errors="*{firstName}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" for="lastName">Last name</label>
                <input class="form-control" id="lastName" th:field="*{lastName}" autocomplete="family-name" required>
                <div class="field-error" th:errors="*{lastName}"></div>
            </div>
        </div>

        <p class="form-section-title">Sign-in credentials</p>
        <div class="mb-3">
            <label class="form-label" for="email">Email address</label>
            <input class="form-control" id="email" type="email" th:field="*{email}" autocomplete="email" required placeholder="you@example.com">
            <div class="field-error" th:errors="*{email}"></div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password" th:field="*{password}" autocomplete="new-password" required>
                <div class="field-error" th:errors="*{password}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input class="form-control" id="confirmPassword" type="password" th:field="*{confirmPassword}" autocomplete="new-password" required>
                <div class="field-error" th:errors="*{confirmPassword}"></div>
            </div>
        </div>
        <div class="field-error mb-3" th:errors="*{passwordConfirmed}"></div>

        <button class="btn btn-primary w-100 mt-1" type="submit">
            <i class="bi bi-person-check me-1"></i>Create account
        </button>
    </form>

    <p class="mt-4 mb-0 text-center" style="font-size: 0.875rem">
        <span class="text-secondary">Already have an account?</span>
        <a th:href="@{/login}" class="fw-medium">Sign in</a>
    </p>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
